<template>
    <lightning-card title="Feature Toggle POC" icon-name="utility:settings">
        <div class="slds-p-around_medium">
            <lightning-input
                type="toggle"
                label="Enable Feature"
                checked={isEnabled}
                onchange={handleToggle}>
            </lightning-input>

            <template if:true={isEnabled}>
                <div class="slds-m-top_medium slds-box slds-theme_success">
                    <p class="slds-text-heading_small">
                        Feature is ENABLED ✅
                    </p>
                </div>
            </template>

            <template if:false={isEnabled}>
                <div class="slds-m-top_medium slds-box slds-theme_warning">
                  <!--  <p class="slds-text-heading_small">
                        Feature is DISABLED ⚠️
                    </p>-->
                </div>
            </template>
        </div>
    </lightning-card>
</template>
